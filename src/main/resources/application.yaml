spring:
  application:
    name: systemaaa
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
  datasource:
    url: ${JDBC_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000


logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE